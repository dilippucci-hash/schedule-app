<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f5f5f7">
<title>语音日程</title>
<link rel="manifest" href="manifest.json">
<style>
:root {
  --bg: #f5f5f7;
  --card: #fff;
  --text: #1d1d1f;
  --muted: #86868b;
  --border: #e5e5ea;
  --blue: #007aff;
  --red: #ff3b30;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg); color: var(--text);
  -webkit-tap-highlight-color: transparent;
  user-select: none; -webkit-user-select: none;
}

/* ── Layout ── */
.app {
  display: flex; flex-direction: column;
  height: 100%;
}

/* ── Header ── */
.header {
  background: var(--card); padding: 8px 14px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  height: 44px; flex-shrink: 0;
}
.header h1 { font-size: 17px; font-weight: 700; }

/* ── Week nav ── */
.week-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 10px; height: 36px; flex-shrink: 0; gap: 4px;
}
.week-nav .week-label { font-size: 12px; font-weight: 600; flex:1; text-align: center; }
.week-nav button {
  width: 28px; height: 28px; border-radius: 50%; border: none;
  background: var(--card); font-size: 14px; cursor: pointer;
  box-shadow: 0 1px 6px rgba(0,0,0,.06);
}
.today-btn {
  font-size: 10px; padding: 4px 8px; border-radius: 12px;
  border: 1.5px solid var(--blue); background: #fff;
  color: var(--blue); font-weight: 600; cursor: pointer;
}

/* ── Timetable (scrollable) ── */
.timetable-wrap {
  flex: 1; overflow: auto; -webkit-overflow-scrolling: touch;
  background: var(--card); margin: 0 6px;
  border-radius: 12px; box-shadow: 0 1px 8px rgba(0,0,0,.05);
  position: relative;
}
.timetable-inner { position: relative; }
.timetable {
  display: grid;
  grid-template-columns: 38px repeat(7, 1fr);
  min-width: 100%; font-size: 10px;
}

.tt-header {
  position: sticky; top: 0; z-index: 3;
  background: var(--card); padding: 6px 1px; text-align: center;
  font-weight: 600; font-size: 10px; border-bottom: 1px solid var(--border);
}
.tt-header.today { background: #e8f2ff; }
.tt-header .day-date {
  display: block; width: 20px; height: 20px; line-height: 20px;
  border-radius: 50%; margin: 2px auto 0; font-size: 10px;
}
.tt-header.today .day-date { background: var(--blue); color: #fff; }

.tt-time {
  position: sticky; left: 0; z-index: 2;
  background: var(--card); text-align: center;
  font-size: 9px; color: var(--muted); padding-top: 3px;
  border-right: 1px solid var(--border); font-weight: 500;
}
.tt-cell {
  height: 46px; border-bottom: 1px solid #f0f0f5;
  border-right: 1px solid #f0f0f5;
  cursor: pointer; position: relative;
}
.tt-cell:active { background: #f0f0f5; }
.tt-cell.today { background: #fafbff; }

/* ── Event blocks (fluorescent) ── */
.evt-block {
  position: absolute; border-radius: 4px; cursor: pointer;
  overflow: hidden; font-size: 9px; font-weight: 600;
  line-height: 1.2; padding: 2px 4px;
  white-space: nowrap; text-overflow: ellipsis;
  z-index: 1; border-left: 3px solid;
  transition: transform .1s;
}
.evt-block:active { transform: scale(.97); z-index: 5; }
.evt-block .evt-time { font-size: 7px; opacity: .7; display: block; }
.evt-block .evt-title { display: block; overflow: hidden; text-overflow: ellipsis; }

.f0 { background: rgba(255,235,120,0.80); border-left-color:#e6b800; color:#5a4a00; }
.f1 { background: rgba(255,145,145,0.80); border-left-color:#e03131; color:#6B1010; }
.f2 { background: rgba(135,225,155,0.80); border-left-color:#2f9e44; color:#0D4A18; }
.f3 { background: rgba(135,205,255,0.80); border-left-color:#1971c2; color:#003560; }
.f4 { background: rgba(210,150,240,0.80); border-left-color:#845ef7; color:#3B0070; }
.f5 { background: rgba(255,185,105,0.80); border-left-color:#e8590c; color:#6B2D00; }
.f6 { background: rgba(100,225,205,0.80); border-left-color:#0c8599; color:#003D3D; }
.f7 { background: rgba(255,145,185,0.80); border-left-color:#d6336c; color:#6B0028; }

/* ── Bottom input bar ── */
.input-bar {
  height: 50px; flex-shrink: 0;
  background: #fff; border-top: 1px solid #e5e5ea;
  display: flex; align-items: center; gap: 8px;
  padding: 0 10px;
}
.input-bar input {
  flex: 1; height: 34px; padding: 0 12px;
  border: 1.5px solid #ddd; border-radius: 17px;
  font-size: 14px; font-family: inherit; background: #f5f5f7;
  outline: none; min-width: 0;
}
.input-bar input:focus { border-color: var(--blue); background: #fff; }
.input-bar button {
  width: 34px; height: 34px; border-radius: 50%; border: none;
  background: var(--blue); color: #fff; font-size: 16px;
  cursor: pointer; flex-shrink: 0;
}
.input-bar button:active { transform: scale(.92); }
.input-bar button:disabled { background: #bbb; }

/* ── Confirm bar (appears above input bar) ── */
.confirm-bar {
  display: none; background: var(--card);
  border-top: 1px solid var(--border);
  padding: 10px 14px;
}
.confirm-bar .cf-text {
  font-size: 13px; font-weight: 500; margin-bottom: 8px;
}
.confirm-bar .cf-btns { display: flex; gap: 8px; }
.confirm-bar .cf-btns button {
  flex:1; padding: 8px; border-radius: 6px; border: none;
  font-size: 13px; font-weight: 600; cursor: pointer;
}
.cf-btns .btn-yes { background: var(--blue); color: #fff; }
.cf-btns .btn-no { background: #f1f1f4; color: var(--text); }

/* ── Event detail sheet ── */
.sheet-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 200;
  display: none; align-items: flex-end;
}
.sheet {
  background: var(--card); border-radius: 16px 16px 0 0;
  padding: 16px 18px 28px; width: 100%; max-height: 75vh;
  overflow-y: auto;
}
.sheet-handle { width: 32px; height: 3px; background: #d1d1d6; border-radius: 2px; margin: 0 auto 12px; }
.sheet h3 { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
.sheet .sheet-info { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
.sheet .sheet-actions { display: flex; gap: 8px; }
.sheet .sheet-actions button {
  flex:1; padding: 10px; border-radius: 8px; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer;
}
.sheet-tag.remind { font-size: 10px; padding: 3px 8px; border-radius: 10px; font-weight: 600; background: #fff3cd; color: #856404; }

/* ── Settings ── */
.settings-panel {
  position: fixed; inset: 0; z-index: 300; display: none;
  align-items: center; justify-content: center; background: rgba(0,0,0,.4);
}
.settings-card {
  background: var(--card); border-radius: 16px; padding: 20px;
  width: 300px; max-width: 90vw; max-height: 80vh; overflow-y: auto;
}
.settings-card h3 { font-size: 16px; margin-bottom: 10px; }
.settings-card label {
  display: block; font-size: 10px; font-weight: 600;
  color: var(--muted); margin-bottom: 2px; margin-top: 8px;
}
.settings-card input, .settings-card select {
  width: 100%; padding: 8px 10px; border: 1.5px solid var(--border);
  border-radius: 6px; font-size: 12px; font-family: inherit;
}
.settings-card .btn-row { display: flex; gap: 8px; margin-top: 14px; }
.settings-card .btn-row button {
  flex:1; padding: 9px; border-radius: 6px; border: none;
  font-size: 13px; font-weight: 600; cursor: pointer;
}

/* ── Toast ── */
.toast {
  position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
  background: #1d1d1f; color: #fff; padding: 8px 18px; border-radius: 16px;
  font-size: 12px; font-weight: 600; z-index: 999;
  animation: toastIn .25s; pointer-events: none;
}
@keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(-8px); } }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <h1>📅 语音日程</h1>
    <button onclick="openSettings()" style="width:30px;height:30px;border-radius:50%;border:none;background:#f0f0f4;font-size:15px;cursor:pointer;">⚙️</button>
  </div>

  <!-- Week navigation -->
  <div class="week-nav">
    <button onclick="changeWeek(-1)">◀</button>
    <span class="week-label" id="weekLabel"></span>
    <button onclick="changeWeek(1)">▶</button>
    <button class="today-btn" onclick="goThisWeek()">本周</button>
  </div>

  <!-- Timetable -->
  <div class="timetable-wrap" id="timetableWrap">
    <div class="timetable-inner" id="timetableInner">
      <div class="timetable" id="timetable"></div>
    </div>
  </div>

  <!-- Confirm bar (between timetable and input) -->
  <div class="confirm-bar" id="confirmBar">
    <div class="cf-text" id="cfText"></div>
    <div class="cf-btns">
      <button class="btn-yes" onclick="confirmAdd()">✓ 添加</button>
      <button class="btn-no" onclick="cancelAdd()">✗ 取消</button>
    </div>
  </div>

  <!-- Input bar (always visible at bottom) -->
  <div class="input-bar">
    <input type="text" id="scheduleInput"
      placeholder="说说日程，如：明天下午3点开会"
      autocomplete="off">
    <button id="sendBtn" onclick="submitInput()">➤</button>
  </div>
</div>

<!-- Event detail sheet -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet(event)">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div id="sheetContent"></div>
  </div>
</div>

<!-- Settings -->
<div class="settings-panel" id="settingsPanel" onclick="if(event.target===this)closeSettings()">
  <div class="settings-card" onclick="event.stopPropagation()">
    <h3>⚙️ 设置</h3>
    <label style="color:var(--blue);">🧠 日程解析 (LLM)</label>
    <label>API 地址</label>
    <input type="text" id="cfgApiUrl">
    <label>API Key</label>
    <input type="password" id="cfgApiKey">
    <label>模型</label>
    <input type="text" id="cfgModel">
    <div class="btn-row">
      <button style="background:#f1f1f4;color:var(--text);" onclick="closeSettings()">取消</button>
      <button style="background:var(--blue);color:#fff;" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<script>
// ==================== DATA ====================
const STORAGE_KEY = 'voice_schedule_events';
const SETTINGS_KEY = 'voice_schedule_settings';

let events = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let settings = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
let weekOffset = 0;
let pendingParsed = null;

const defaults = {
  apiUrl: 'https://api.deepseek.com/v1/chat/completions',
  apiKey: 'sk-310cc6d8520544fab871f78bcd254b4b',
  model: 'deepseek-chat',
};
settings = { ...defaults, ...settings };

// ==================== WEEK CALC ====================
function getMonday(date) {
  const d = new Date(date);
  const day = d.getDay();
  d.setDate(d.getDate() - day + (day === 0 ? -6 : 1));
  d.setHours(0,0,0,0); return d;
}

function getWeekDates() {
  const monday = getMonday(new Date());
  monday.setDate(monday.getDate() + weekOffset * 7);
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(d.getDate() + i); dates.push(d);
  }
  return dates;
}

function fmtDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

// ==================== RENDER ====================
function getEventsForDate(dateStr) {
  return events.filter(e => e.date === dateStr).sort((a,b) => (a.startTime||'').localeCompare(b.startTime||''));
}

function computeDayLayout(dayEvents) {
  if (dayEvents.length === 0) return { maxCols: 1, colMap: {} };
  let maxCols = 1;
  const hourMap = {};
  for (let h = 6; h <= 23; h++) {
    hourMap[h] = dayEvents.filter(e => {
      const sh = parseInt((e.startTime||'06').split(':')[0]);
      const eh = parseInt((e.endTime||'24').split(':')[0]);
      return sh <= h && eh > h;
    });
    maxCols = Math.max(maxCols, hourMap[h].length);
  }

  const sorted = [...dayEvents].sort((a,b) =>
    (a.startTime||'00:00').localeCompare(b.startTime||'00:00'));
  const colMap = {};
  const colBusyUntil = {};

  for (const evt of sorted) {
    const sh = parseInt((evt.startTime||'06').split(':')[0]);
    let col = 0;
    while (colBusyUntil[col] !== undefined && colBusyUntil[col] > sh) col++;
    colMap[evt.id] = col;
    colBusyUntil[col] = parseInt((evt.endTime||'24').split(':')[0]);
    if (col + 1 > maxCols) maxCols = col + 1;
  }
  return { maxCols, colMap };
}

function renderTimetable() {
  const dates = getWeekDates();
  const todayStr = fmtDate(new Date());
  const days = ['周一','周二','周三','周四','周五','周六','周日'];

  const grid = document.getElementById('timetable');
  const label = document.getElementById('weekLabel');
  const first = dates[0], last = dates[6];
  label.textContent = `${first.getMonth()+1}月${first.getDate()}日 - ${last.getMonth()+1}月${last.getDate()}日`;

  // Build grid HTML
  let html = '<div style="position:sticky;top:0;left:0;z-index:4;background:var(--card);"></div>';
  for (let i = 0; i < 7; i++) {
    const isToday = fmtDate(dates[i]) === todayStr;
    html += `<div class="tt-header${isToday?' today':''}" style="position:sticky;top:0;z-index:3;">
      <span>${days[i]}</span>
      <span class="day-date">${dates[i].getDate()}</span>
    </div>`;
  }
  for (let h = 6; h <= 23; h++) {
    html += `<div class="tt-time" style="position:sticky;left:0;z-index:2;">${String(h).padStart(2,'0')}:00</div>`;
    for (let i = 0; i < 7; i++) {
      const dateStr = fmtDate(dates[i]);
      const isToday = dateStr === todayStr;
      html += `<div class="tt-cell${isToday?' today':''}"
        data-date="${dateStr}" data-hour="${h}"
        onclick="onCellClick('${dateStr}',${h})"></div>`;
    }
  }
  grid.innerHTML = html;

  // Remove old event blocks
  document.querySelectorAll('.evt-block').forEach(el => el.remove());

  // Render event overlay blocks
  const inner = document.getElementById('timetableInner');
  const HEADER_H = 40; // approximate
  const ROW_H = 46;

  for (let dayIdx = 0; dayIdx < 7; dayIdx++) {
    const dateStr = fmtDate(dates[dayIdx]);
    const dayEvents = getEventsForDate(dateStr);
    if (dayEvents.length === 0) continue;

    const layout = computeDayLayout(dayEvents);

    for (const evt of dayEvents) {
      const startH = parseInt((evt.startTime||'06').split(':')[0]);
      const startM = parseInt((evt.startTime||'06:00').split(':')[1]||'0');
      const endH = parseInt((evt.endTime||'24').split(':')[0]);
      const endM = parseInt((evt.endTime||'24:00').split(':')[1]||'0');

      const top = HEADER_H + (startH - 6) * ROW_H + (startM/60)*ROW_H;
      const height = Math.max(16, (endH - 6)*ROW_H + (endM/60)*ROW_H - (startH - 6)*ROW_H - (startM/60)*ROW_H);

      const colIndex = layout.colMap[evt.id] || 0;
      const totalCols = layout.maxCols;

      const gridWidth = grid.offsetWidth;
      const dayColWidth = (gridWidth - 38) / 7;
      const left = 38 + dayIdx * dayColWidth + (colIndex/totalCols)*dayColWidth;
      const width = Math.max(20, dayColWidth/totalCols - 2);

      const fluoroClass = 'f' + (events.findIndex(e => e.id === evt.id) % 8);
      const timeLabel = evt.startTime ? evt.startTime.slice(0,5) : '';

      const block = document.createElement('div');
      block.className = 'evt-block ' + fluoroClass;
      block.style.cssText = `top:${top}px;left:${left}px;width:${width}px;height:${height}px;`;
      block.onclick = function(e) { e.stopPropagation(); openEvent(evt.id); };
      block.innerHTML = height > 30
        ? `<span class="evt-time">${timeLabel}</span><span class="evt-title">${escHtml(evt.title)}</span>`
        : `<span class="evt-title">${escHtml(evt.title)}</span>`;
      inner.appendChild(block);
    }
  }

  // Scroll to current time
  if (weekOffset === 0) {
    const curHour = new Date().getHours();
    setTimeout(() => {
      document.getElementById('timetableWrap').scrollTop = Math.max(0, HEADER_H + (curHour - 7) * ROW_H);
    }, 100);
  }
}

// ==================== EVENT SHEET ====================
function onCellClick(dateStr, hour) {
  showAddSheet(dateStr, `${String(hour).padStart(2,'0')}:00`, `${String(hour+1).padStart(2,'0')}:00`);
}

function showAddSheet(dateStr, startTime, endTime) {
  const sheet = document.getElementById('sheetOverlay');
  document.getElementById('sheetContent').innerHTML = `
    <div class="sheet-handle"></div>
    <h3>新建日程</h3>
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:8px;">
      <input type="text" id="addTitle" placeholder="日程标题" style="padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;">
      <input type="date" id="addDate" value="${dateStr}" style="padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;">
      <div style="display:flex;gap:6px;">
        <input type="time" id="addStart" value="${startTime}" style="flex:1;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;">
        <span style="line-height:38px;color:var(--muted);">至</span>
        <input type="time" id="addEnd" value="${endTime}" style="flex:1;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;">
      </div>
      <textarea id="addDesc" placeholder="备注" style="padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;min-height:50px;resize:vertical;"></textarea>
      <label style="font-size:13px;display:flex;align-items:center;gap:6px;cursor:pointer;">
        <input type="checkbox" id="addRemind" checked> 提前15分钟提醒
      </label>
    </div>
    <div class="sheet-actions" style="margin-top:14px;">
      <button style="background:#f1f1f4;color:var(--text);" onclick="closeSheet()">取消</button>
      <button style="background:var(--blue);color:#fff;" onclick="saveNewEvent()">保存</button>
    </div>`;
  sheet.style.display = 'flex';
}

function openEvent(id) {
  const evt = events.find(e => e.id === id);
  if (!evt) return;
  const sheet = document.getElementById('sheetOverlay');
  const timeStr = evt.startTime ? `${evt.startTime.slice(0,5)} - ${evt.endTime?.slice(0,5)||'?'}` : '全天';
  document.getElementById('sheetContent').innerHTML = `
    <div class="sheet-handle"></div>
    <h3>${escHtml(evt.title)}</h3>
    <div class="sheet-info">📅 ${evt.date} · ${timeStr}</div>
    ${evt.description ? `<div style="font-size:13px;color:#555;margin-bottom:10px;">${escHtml(evt.description)}</div>` : ''}
    ${evt.reminder ? '<span class="sheet-tag remind">🔔 已开启提醒</span>' : ''}
    <div class="sheet-actions" style="margin-top:14px;">
      <button style="background:#f1f1f4;color:var(--text);" onclick="closeSheet()">关闭</button>
      <button style="background:var(--red);color:#fff;" onclick="deleteEvent('${evt.id}')">删除</button>
    </div>`;
  sheet.style.display = 'flex';
}

function closeSheet(evt) {
  if (evt && evt.target !== document.getElementById('sheetOverlay')) return;
  document.getElementById('sheetOverlay').style.display = 'none';
}

function saveNewEvent() {
  const title = document.getElementById('addTitle').value.trim();
  const date = document.getElementById('addDate').value;
  const startTime = document.getElementById('addStart').value;
  const endTime = document.getElementById('addEnd').value;
  const description = document.getElementById('addDesc').value.trim();
  const reminder = document.getElementById('addRemind').checked;
  if (!title) { toast('请输入标题'); return; }

  events.push({
    id: 'evt_' + Date.now(), title, date,
    startTime: startTime || null, endTime: endTime || null,
    description, reminder, createdAt: Date.now()
  });
  saveAndRefresh(); closeSheet();
  toast('✅ 已添加: ' + title);
}

function deleteEvent(id) {
  if (!confirm('确定删除？')) return;
  events = events.filter(e => e.id !== id);
  saveAndRefresh(); closeSheet();
  toast('🗑️ 已删除');
}

function saveAndRefresh() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
  renderTimetable();
  checkReminders();
}

function escHtml(s) {
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

function toast(msg) {
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.remove(); }, 2000);
}

// ==================== INPUT + LLM ====================
async function submitInput() {
  const inp = document.getElementById('scheduleInput');
  const btn = document.getElementById('sendBtn');
  const text = inp.value.trim();
  if (!text) { toast('请输入日程内容'); return; }

  btn.disabled = true; btn.textContent = '⏳';

  let parsed = null;
  if (settings.apiKey) {
    try { parsed = await callLLM(text); }
    catch (e) { console.error('LLM err:', e); parsed = localParse(text); }
  } else {
    parsed = localParse(text);
  }

  btn.disabled = false; btn.textContent = '➤';

  if (!parsed || !parsed.title) {
    toast('❌ 无法识别，请换种说法试试'); return;
  }

  pendingParsed = parsed;
  const timeInfo = parsed.startTime ? `${parsed.startTime}-${parsed.endTime||''}` : '全天';
  const remindInfo = parsed.reminder ? '· 🔔提醒' : '';
  document.getElementById('cfText').innerHTML =
    `<b>${escHtml(parsed.title)}</b><br><span style="font-size:11px;color:var(--muted);">📅 ${parsed.date} · ${timeInfo} ${remindInfo}</span>`;
  document.getElementById('confirmBar').style.display = 'block';
}

function confirmAdd() {
  if (!pendingParsed) return;
  const p = pendingParsed;
  events.push({
    id: 'evt_' + Date.now(),
    title: p.title || '未命名', date: p.date,
    startTime: p.startTime || null, endTime: p.endTime || null,
    description: p.description || '', reminder: p.reminder || false,
    createdAt: Date.now()
  });
  saveAndRefresh();
  document.getElementById('scheduleInput').value = '';
  document.getElementById('confirmBar').style.display = 'none';
  pendingParsed = null;
  toast('✅ 已添加: ' + p.title);
}

function cancelAdd() {
  pendingParsed = null;
  document.getElementById('confirmBar').style.display = 'none';
}

async function callLLM(text) {
  const today = fmtDate(new Date());
  const now = new Date();
  const nowTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const weekDates = getWeekDates();

  const systemPrompt = `你是日程解析助手。提取自然语言中的日程信息，返回JSON。

当前时间: ${today} ${nowTime} ${['周日','周一','周二','周三','周四','周五','周六'][now.getDay()]}
本周: 一${fmtDate(weekDates[0])} 二${fmtDate(weekDates[1])} 三${fmtDate(weekDates[2])} 四${fmtDate(weekDates[3])} 五${fmtDate(weekDates[4])} 六${fmtDate(weekDates[5])} 日${fmtDate(weekDates[6])}

规则:
1. 今天/明天/后天/大后天 → YYYY-MM-DD
2. 下周X = 本周日期+7天
3. 上午/下午/晚上转24小时制: 上午6-12, 下午12-18, 晚上18-22
4. "8点"/"三点半" → HH:MM
5. "一小时"/"两小时"推算结束时间
6. 无时间则startTime/endTime为null
7. 含"提醒/别忘了/记得"则reminder=true

只输出JSON:
{"title":"标题","date":"YYYY-MM-DD","startTime":"HH:MM或null","endTime":"HH:MM或null","description":"补充","reminder":false}`;

  const resp = await fetch(settings.apiUrl, {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${settings.apiKey}` },
    body: JSON.stringify({ model: settings.model, messages:[
      { role:'system', content: systemPrompt },
      { role:'user', content: text }
    ], temperature: 0.1, max_tokens: 500 })
  });
  if (!resp.ok) throw new Error('API '+resp.status);
  const data = await resp.json();
  const content = data.choices?.[0]?.message?.content || '';
  const m = content.match(/\{[\s\S]*\}/);
  if (!m) throw new Error('No JSON');
  return JSON.parse(m[0]);
}

function localParse(text) {
  const today = fmtDate(new Date());
  const weekDates = getWeekDates();

  let date = today;
  const dayMap = {
    '今天':today, '明天':fmtDate(new Date(Date.now()+86400000)),
    '后天':fmtDate(new Date(Date.now()+172800000)),
    '大后天':fmtDate(new Date(Date.now()+259200000))
  };
  for (const [w,d] of Object.entries(dayMap)) { if (text.includes(w)) { date=d; break; } }

  if (date === today) {
    const wmap = {};
    ['周一','周二','周三','周四','周五','周六','周日'].forEach((n,i) => { wmap[n] = fmtDate(weekDates[i]); });
    for (const [w,d] of Object.entries(wmap)) {
      if (text.includes(w)) {
        const wd = new Date(d);
        if (wd < new Date(today)) wd.setDate(wd.getDate()+7);
        date = fmtDate(wd); break;
      }
    }
  }

  const times = [];
  const tm = text.match(/(\d{1,2})[点:：](\d{2})?/g);
  if (tm) {
    for (const m of tm) {
      const p = m.match(/(\d{1,2})[点:：](\d{2})?/);
      if (p) {
        let h = parseInt(p[1]); const min = p[2] ? parseInt(p[2]) : 0;
        if (/下午|晚上|傍晚/.test(text) && h<12) h+=12;
        if (/上午|早上|早晨/.test(text) && h===12) h=0;
        if (!/[上中下]午|晚上|早上|早晨|傍晚/.test(text) && h<=6 && h>=1) h+=12;
        times.push(`${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}`);
      }
    }
  }

  let startTime=null, endTime=null;
  if (times.length>=2) { startTime=times[0]; endTime=times[1]; }
  else if (times.length===1) { startTime=times[0]; endTime=`${String(parseInt(startTime)+1).padStart(2,'0')}:00`; }

  const reminder = /提醒|别忘了|记得|通知|叫我/.test(text);
  let title = text
    .replace(/今天|明天|后天|大后天/g,'')
    .replace(/下周[一二三四五六日天]/g,'')
    .replace(/[周礼拜][一二三四五六日天]/g,'')
    .replace(/\d{1,2}[点:：]\d{0,2}[分]?/g,'')
    .replace(/提醒[我]?|别忘了|记得|通知[我]?|叫我/g,'')
    .replace(/[上中下]午|晚上|早上|早晨|傍晚/g,'')
    .replace(/\s+/g,' ').trim();
  if (!title) title='未命名日程';

  return { title, date, startTime, endTime, description:'', reminder };
}

// ==================== SETTINGS ====================
function openSettings() {
  document.getElementById('cfgApiUrl').value = settings.apiUrl;
  document.getElementById('cfgApiKey').value = settings.apiKey;
  document.getElementById('cfgModel').value = settings.model;
  document.getElementById('settingsPanel').style.display = 'flex';
}
function closeSettings() { document.getElementById('settingsPanel').style.display = 'none'; }
function saveSettings() {
  settings.apiUrl = document.getElementById('cfgApiUrl').value.trim();
  settings.apiKey = document.getElementById('cfgApiKey').value.trim();
  settings.model = document.getElementById('cfgModel').value.trim();
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
  closeSettings(); toast('✅ 已保存');
}

// ==================== NAVIGATION ====================
function changeWeek(d) { weekOffset += d; renderTimetable(); }
function goThisWeek() { weekOffset = 0; renderTimetable(); }

// ==================== REMINDERS ====================
function checkReminders() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const now = new Date();
  const nowStr = fmtDate(now), nowMin = now.getHours()*60+now.getMinutes();
  events.forEach(e => {
    if (!e.reminder || !e.startTime || e.date !== nowStr) return;
    const [h,m] = e.startTime.split(':').map(Number);
    const diff = h*60+m - nowMin;
    if (diff >= 0 && diff <= 15) {
      const key = `n_${e.id}_${nowStr}_${Math.floor(nowMin/5)}`;
      if (!sessionStorage.getItem(key)) {
        sessionStorage.setItem(key,'1');
        new Notification('🔔 日程提醒', {
          body: `${e.title}\n${e.startTime.slice(0,5)} · ${diff===0?'现在！':diff+'分钟后'}`,
          tag: e.id, requireInteraction: true
        });
        toast(`🔔 ${e.title}`);
      }
    }
  });
}

// ==================== INIT ====================
function init() {
  renderTimetable();
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
  setInterval(checkReminders, 30000);
  checkReminders();

  // Enter to submit
  document.getElementById('scheduleInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') submitInput();
  });

  // Resize handler
  let rt;
  window.addEventListener('resize', function() {
    clearTimeout(rt); rt = setTimeout(renderTimetable, 200);
  });
}

init();
