<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>语音日程</title>
<style>
:root {
  --bg: #f5f5f7;
  --card: #fff;
  --text: #1d1d1f;
  --muted: #86868b;
  --border: #e5e5ea;
  --blue: #007aff;
  --blue-bg: #e8f2ff;
  --red: #ff3b30;
  --orange: #ff9500;
  --green: #34c759;
  --purple: #af52de;
  --teal: #5ac8fa;
  --pink: #ff2d55;
  --shadow: 0 2px 12px rgba(0,0,0,.06);
  --radius: 12px;
  --radius-sm: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}
/* ── Header ── */
.header {
  background: var(--card);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -.3px;
}
.header-actions { display: flex; gap: 8px; }
.icon-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none;
  background: var(--bg);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
}
.icon-btn:active { background: #d1d1d6; transform: scale(.94); }
/* ── Week nav ── */
.week-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  flex-shrink: 0;
  gap: 8px;
}
.week-nav .week-label {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  text-align: center;
  flex:1;
}
.week-nav .nav-arrow {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: none;
  background: var(--card);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow);
  transition: all .15s;
}
.week-nav .nav-arrow:active { background: #d1d1d6; }
.today-btn {
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 16px;
  border: 1.5px solid var(--blue);
  background: #fff;
  color: var(--blue);
  font-weight: 600;
  cursor: pointer;
}
/* ── Timetable ── */
.timetable-wrap {
  flex: 1;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
  background: var(--card);
  margin: 0 10px;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}
.timetable {
  display: grid;
  grid-template-columns: 40px repeat(7, 1fr);
  min-width: 100%;
  font-size: 11px;
}
/* Day headers */
.tt-header {
  position: sticky;
  top: 0;
  z-index: 2;
  background: var(--card);
  padding: 10px 2px;
  text-align: center;
  font-weight: 600;
  font-size: 11px;
  border-bottom: 1px solid var(--border);
}
.tt-header.today-col { background: var(--blue-bg); }
.tt-header .day-name { display: block; }
.tt-header .day-date {
  display: block;
  width: 24px; height: 24px;
  line-height: 24px;
  border-radius: 50%;
  margin: 4px auto 0;
  font-size: 12px;
}
.tt-header.today-col .day-date {
  background: var(--blue);
  color: #fff;
}
/* Time labels */
.tt-time {
  position: sticky;
  left: 0;
  z-index: 1;
  background: var(--card);
  text-align: center;
  font-size: 10px;
  color: var(--muted);
  padding: 2px 0;
  border-right: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 6px;
  font-weight: 500;
}
/* Grid cells */
.tt-cell {
  min-height: 44px;
  border-bottom: 1px solid #f0f0f5;
  border-right: 1px solid #f0f0f5;
  position: relative;
  cursor: pointer;
  transition: background .1s;
  padding: 2px;
}
.tt-cell:active { background: #f0f0f5; }
.tt-cell.today-col { background: #f8f9ff; }
/* Event pill */
.evt-pill {
  background: var(--blue);
  color: #fff;
  border-radius: 4px;
  padding: 3px 4px;
  font-size: 9px;
  font-weight: 600;
  line-height: 1.3;
  overflow: hidden;
  cursor: pointer;
  white-space: nowrap;
  text-overflow: ellipsis;
  transition: transform .1s;
  position: relative;
  z-index: 1;
}
.evt-pill:active { transform: scale(.95); }
.evt-pill.c1 { background: #007aff; }
.evt-pill.c2 { background: #ff9500; }
.evt-pill.c3 { background: #34c759; }
.evt-pill.c4 { background: #af52de; }
.evt-pill.c5 { background: #ff2d55; }
/* ── Floating mic button ── */
.fab-wrap {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.fab {
  width: 60px; height: 60px;
  border-radius: 50%;
  border: none;
  background: var(--blue);
  color: #fff;
  font-size: 28px;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(0,122,255,.35);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
  position: relative;
}
.fab:active { transform: scale(.92); }
.fab.listening {
  background: var(--red);
  box-shadow: 0 4px 24px rgba(255,59,48,.45);
  animation: pulse-ring 1.5s infinite;
}
@keyframes pulse-ring {
  0% { box-shadow: 0 4px 24px rgba(255,59,48,.45); }
  50% { box-shadow: 0 4px 40px rgba(255,59,48,.7), 0 0 0 16px rgba(255,59,48,.1); }
  100% { box-shadow: 0 4px 24px rgba(255,59,48,.45); }
}
.fab-label {
  font-size: 11px;
  color: var(--muted);
  font-weight: 500;
}
/* ── Voice status bar ── */
.voice-bar {
  position: fixed;
  bottom: 110px;
  left: 16px;
  right: 16px;
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px 18px;
  box-shadow: 0 8px 32px rgba(0,0,0,.12);
  z-index: 99;
  display: none;
  animation: slideUp .25s;
}
@keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
.voice-bar .vb-text {
  font-size: 15px;
  font-weight: 500;
  line-height: 1.4;
  margin-bottom: 6px;
}
.voice-bar .vb-status {
  font-size: 11px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 6px;
}
.voice-bar .vb-dot {
  width: 8px; height: 8px;
  background: var(--green);
  border-radius: 50%;
}
.voice-bar .vb-dot.thinking {
  background: var(--orange);
  animation: pulse 1s infinite;
}
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }
.voice-bar .vb-confirm {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}
.voice-bar .vb-confirm button {
  flex:1;
  padding: 8px;
  border-radius: 8px;
  border: none;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
.vb-confirm .btn-yes { background: var(--blue); color: #fff; }
.vb-confirm .btn-no { background: #f1f1f4; color: var(--text); }
/* ── Event detail sheet ── */
.sheet-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.35);
  z-index: 200;
  display: none;
  align-items: flex-end;
  animation: fadeIn .2s;
}
@keyframes fadeIn { from { opacity:0; } }
.sheet {
  background: var(--card);
  border-radius: 20px 20px 0 0;
  padding: 20px 20px 32px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  animation: slideUp2 .3s;
}
@keyframes slideUp2 { from { transform:translateY(100%); } }
.sheet-handle {
  width: 36px; height: 4px;
  background: #d1d1d6;
  border-radius: 2px;
  margin: 0 auto 16px;
}
.sheet h3 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.sheet .sheet-date { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
.sheet .sheet-desc { font-size: 14px; line-height: 1.5; color: #555; margin-bottom: 12px; }
.sheet .sheet-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.sheet .sheet-tag {
  font-size: 11px; padding: 4px 10px;
  border-radius: 12px; font-weight: 600;
}
.sheet-tag.remind { background: #fff3cd; color: #856404; }
.sheet .sheet-actions { display: flex; gap: 10px; }
.sheet .sheet-actions button {
  flex:1; padding: 12px; border-radius: 10px;
  border: none; font-size: 14px; font-weight: 600; cursor: pointer;
}
/* ── Settings panel ── */
.settings-panel {
  position: fixed; inset: 0;
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,.4);
}
.settings-card {
  background: var(--card);
  border-radius: 20px;
  padding: 24px;
  width: 320px;
  max-width: 90vw;
}
.settings-card h3 { font-size: 17px; margin-bottom: 16px; }
.settings-card label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 4px;
  margin-top: 12px;
}
.settings-card input, .settings-card select {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
}
.settings-card input:focus { outline: none; border-color: var(--blue); }
.settings-card .hint {
  font-size: 10px; color: var(--muted); margin-top: 4px;
}
.settings-card .btn-row { display: flex; gap: 8px; margin-top: 18px; }
.settings-card .btn-row button {
  flex:1; padding: 10px; border-radius: 8px;
  border: none; font-size: 14px; font-weight: 600; cursor: pointer;
}
/* ── Toast ── */
.toast {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  background: #1d1d1f; color: #fff;
  padding: 10px 20px; border-radius: 20px;
  font-size: 13px; font-weight: 600;
  z-index: 999;
  animation: toastIn .3s;
  pointer-events: none;
}
@keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(-10px); } }
/* ── Empty state ── */
.empty-hint {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  text-align: center;
  color: var(--muted);
  pointer-events: none;
  font-size: 13px;
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>📅 语音日程</h1>
  <div class="header-actions">
    <button class="icon-btn" onclick="openSettings()" title="设置">⚙️</button>
  </div>
</div>

<!-- Week navigation -->
<div class="week-nav">
  <button class="nav-arrow" onclick="changeWeek(-1)">◀</button>
  <span class="week-label" id="weekLabel"></span>
  <button class="nav-arrow" onclick="changeWeek(1)">▶</button>
  <button class="today-btn" onclick="goThisWeek()">本周</button>
</div>

<!-- Timetable -->
<div class="timetable-wrap" id="timetableWrap">
  <div class="timetable" id="timetable"></div>
</div>

<!-- Floating mic button -->
<div class="fab-wrap">
  <div class="voice-bar" id="voiceBar">
    <div class="vb-text" id="voiceText">...</div>
    <div class="vb-status" id="voiceStatus">
      <span class="vb-dot" id="voiceDot"></span>
      <span id="voiceStatusText">正在听...</span>
    </div>
    <div class="vb-confirm" id="voiceConfirm" style="display:none;"></div>
  </div>
  <button class="fab" id="fabBtn" onclick="toggleVoice()">🎤</button>
  <div class="fab-label" id="fabLabel">点按说话</div>
</div>

<!-- Event detail sheet -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet(event)">
  <div class="sheet" id="sheetBox" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div id="sheetContent"></div>
  </div>
</div>

<!-- Settings -->
<div class="settings-panel" id="settingsPanel" onclick="if(event.target===this)closeSettings()">
  <div class="settings-card" onclick="event.stopPropagation()">
    <h3>⚙️ 设置</h3>
    <label>LLM API 地址</label>
    <input type="text" id="cfgApiUrl" placeholder="https://api.deepseek.com/v1/chat/completions">
    <div class="hint">DeepSeek / OpenAI 兼容接口均可</div>

    <label>API Key</label>
    <input type="password" id="cfgApiKey" placeholder="sk-...">

    <label>模型</label>
    <input type="text" id="cfgModel" placeholder="deepseek-chat">
    <div class="hint">如 deepseek-chat / gpt-4o-mini 等</div>

    <label>语音语言</label>
    <select id="cfgLang">
      <option value="zh-CN">中文普通话</option>
      <option value="en-US">English</option>
      <option value="yue-Hant-HK">粤语</option>
    </select>

    <div class="btn-row">
      <button style="background:#f1f1f4;color:var(--text);" onclick="closeSettings()">取消</button>
      <button style="background:var(--blue);color:#fff;" onclick="saveSettings()">保存</button>
    </div>
    <div class="hint" style="margin-top:12px;text-align:center;">
      无 Key 时使用本地规则解析<br>获取 Key: <a href="https://platform.deepseek.com" target="_blank">platform.deepseek.com</a>
    </div>
  </div>
</div>

<script>
// ==================== DATA ====================
const STORAGE_KEY = 'voice_schedule_events';
const SETTINGS_KEY = 'voice_schedule_settings';
const COLORS = ['c1','c2','c3','c4','c5'];

let events = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let settings = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
let weekOffset = 0; // 0 = current week
let recognition = null;
let isListening = false;
let pendingParsed = null;

// Default settings
const defaults = {
  apiUrl: 'https://api.deepseek.com/v1/chat/completions',
  apiKey: '',
  model: 'deepseek-chat',
  lang: 'zh-CN'
};
settings = { ...defaults, ...settings };

// ==================== WEEK CALCULATION ====================
function getMonday(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  d.setDate(diff);
  d.setHours(0,0,0,0);
  return d;
}

function getWeekDates() {
  const now = new Date();
  const monday = getMonday(now);
  monday.setDate(monday.getDate() + weekOffset * 7);
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(d.getDate() + i);
    dates.push(d);
  }
  return dates;
}

function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtShort(d) {
  return `${d.getMonth()+1}/${d.getDate()}`;
}

// ==================== RENDER TIMETABLE ====================
const TIME_SLOTS = [];
for (let h = 6; h <= 23; h++) {
  TIME_SLOTS.push(`${String(h).padStart(2,'0')}:00`);
}

function getEventsForDate(dateStr) {
  return events.filter(e => e.date === dateStr).sort((a,b) => (a.startTime||'').localeCompare(b.startTime||''));
}

function getEventsForDateAndSlot(dateStr, hour) {
  return events.filter(e => {
    if (e.date !== dateStr) return false;
    const startH = parseInt(e.startTime?.split(':')[0] || '0');
    const endH = parseInt(e.endTime?.split(':')[0] || '0');
    return startH <= hour && endH > hour;
  });
}

function getEventColor(eventId) {
  const idx = events.findIndex(e => e.id === eventId);
  return COLORS[idx % COLORS.length];
}

function renderTimetable() {
  const dates = getWeekDates();
  const todayStr = fmtDate(new Date());
  const days = ['周一','周二','周三','周四','周五','周六','周日'];
  const grid = document.getElementById('timetable');
  const label = document.getElementById('weekLabel');

  const first = dates[0], last = dates[6];
  label.textContent = `${first.getMonth()+1}月${first.getDate()}日 - ${last.getMonth()+1}月${last.getDate()}日`;

  let html = '';

  // Empty corner
  html += '<div class="tt-header" style="position:sticky;top:0;left:0;z-index:3;background:var(--card);"></div>';

  // Day headers
  for (let i = 0; i < 7; i++) {
    const d = dates[i];
    const dateStr = fmtDate(d);
    const isToday = dateStr === todayStr;
    html += `<div class="tt-header${isToday?' today-col':''}" style="position:sticky;top:0;z-index:2;">
      <span class="day-name">${days[i]}</span>
      <span class="day-date">${d.getDate()}</span>
    </div>`;
  }

  // Time rows
  for (const slot of TIME_SLOTS) {
    const hour = parseInt(slot);
    html += `<div class="tt-time" style="position:sticky;left:0;z-index:1;">${slot}</div>`;

    for (let i = 0; i < 7; i++) {
      const d = dates[i];
      const dateStr = fmtDate(d);
      const isToday = dateStr === todayStr;
      const cellId = `cell-${dateStr}-${hour}`;
      const cellEvents = getEventsForDateAndSlot(dateStr, hour);

      html += `<div class="tt-cell${isToday?' today-col':''}" id="${cellId}"
        data-date="${dateStr}" data-hour="${hour}"
        onclick="onCellClick('${dateStr}','${hour}')">`;

      // Show only first occurrence of each event (at its start hour)
      for (const evt of cellEvents) {
        const startH = parseInt(evt.startTime?.split(':')[0] || '0');
        if (startH === hour) {
          const colorCls = getEventColor(evt.id);
          const timeStr = evt.startTime?.slice(0,5) || '';
          const endStr = evt.endTime?.slice(0,5) || '';
          html += `<div class="evt-pill ${colorCls}" onclick="event.stopPropagation();openEvent('${evt.id}')"
            title="${evt.title}">${timeStr} ${evt.title}</div>`;
        } else if (startH < hour) {
          // Continuation of event from above
          html += `<div style="height:2px;background:${getEventBg(evt.id)};margin:0 2px;" onclick="event.stopPropagation();openEvent('${evt.id}')"></div>`;
        }
      }

      html += '</div>';
    }
  }

  grid.innerHTML = html;

  // Scroll to 8:00 (current time - 2 hours in the morning)
  const wrap = document.getElementById('timetableWrap');
  const now = new Date();
  const curHour = now.getHours();
  const scrollTo = Math.max(0, curHour - 2);
  const rowHeight = 44;
  // Add 1 for header row
  const scrollPos = (scrollTo - 6 + 1) * rowHeight;
  if (weekOffset === 0) {
    setTimeout(() => { wrap.scrollTop = scrollPos; }, 100);
  }
}

function getEventBg(eventId) {
  const idx = events.findIndex(e => e.id === eventId);
  const map = {0:'#007aff',1:'#ff9500',2:'#34c759',3:'#af52de',4:'#ff2d55'};
  return map[idx % 5] || '#007aff';
}

// ==================== EVENT SHEET ====================
function onCellClick(dateStr, hour) {
  const startTime = `${String(hour).padStart(2,'0')}:00`;
  const endTime = `${String(hour+1).padStart(2,'0')}:00`;
  showAddSheet(dateStr, startTime, endTime);
}

function showAddSheet(dateStr, startTime, endTime) {
  const sheet = document.getElementById('sheetOverlay');
  const content = document.getElementById('sheetContent');
  content.innerHTML = `
    <div class="sheet-handle"></div>
    <h3>新建日程</h3>
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:12px;">
      <input type="text" id="addTitle" placeholder="日程标题" style="width:100%;padding:12px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;">
      <div style="display:flex;gap:8px;">
        <input type="date" id="addDate" value="${dateStr}" style="flex:1;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;">
      </div>
      <div style="display:flex;gap:8px;">
        <input type="time" id="addStart" value="${startTime}" style="flex:1;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;">
        <span style="line-height:40px;color:var(--muted);">至</span>
        <input type="time" id="addEnd" value="${endTime}" style="flex:1;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;">
      </div>
      <textarea id="addDesc" placeholder="备注（可选）" style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;min-height:60px;resize:vertical;"></textarea>
      <label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer;">
        <input type="checkbox" id="addRemind" checked> 提前15分钟提醒
      </label>
    </div>
    <div class="sheet-actions" style="margin-top:16px;">
      <button style="background:#f1f1f4;color:var(--text);" onclick="closeSheet()">取消</button>
      <button style="background:var(--blue);color:#fff;" onclick="saveNewEvent()">保存</button>
    </div>
  `;
  sheet.style.display = 'flex';
}

function openEvent(id) {
  const evt = events.find(e => e.id === id);
  if (!evt) return;
  const sheet = document.getElementById('sheetOverlay');
  const content = document.getElementById('sheetContent');
  const timeStr = evt.startTime ? `${evt.startTime.slice(0,5)} - ${evt.endTime?.slice(0,5) || '?'}` : '全天';
  const remindTag = evt.reminder ? '<span class="sheet-tag remind">🔔 已开启提醒</span>' : '';

  content.innerHTML = `
    <div class="sheet-handle"></div>
    <h3>${escHtml(evt.title)}</h3>
    <div class="sheet-date">📅 ${evt.date} · ${timeStr}</div>
    ${evt.description ? `<div class="sheet-desc">${escHtml(evt.description)}</div>` : ''}
    <div class="sheet-tags">${remindTag}</div>
    <div class="sheet-actions">
      <button style="background:#f1f1f4;color:var(--text);" onclick="closeSheet()">关闭</button>
      <button style="background:var(--red);color:#fff;" onclick="deleteEvent('${evt.id}')">删除</button>
    </div>
  `;
  sheet.style.display = 'flex';
}

function closeSheet(evt) {
  if (evt && evt.target !== document.getElementById('sheetOverlay')) return;
  document.getElementById('sheetOverlay').style.display = 'none';
}

function saveNewEvent() {
  const title = document.getElementById('addTitle').value.trim();
  const date = document.getElementById('addDate').value;
  const startTime = document.getElementById('addStart').value;
  const endTime = document.getElementById('addEnd').value;
  const description = document.getElementById('addDesc').value.trim();
  const reminder = document.getElementById('addRemind').checked;

  if (!title) { toast('请输入标题'); return; }
  if (!date) { toast('请选择日期'); return; }

  const evt = {
    id: 'evt_' + Date.now(),
    title,
    date,
    startTime: startTime || null,
    endTime: endTime || null,
    description,
    reminder,
    createdAt: Date.now()
  };

  events.push(evt);
  saveAndRefresh();
  closeSheet();
  toast('✅ 日程已添加');
}

function deleteEvent(id) {
  if (!confirm('确定删除？')) return;
  events = events.filter(e => e.id !== id);
  saveAndRefresh();
  closeSheet();
  toast('🗑️ 已删除');
}

function saveAndRefresh() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
  renderTimetable();
  checkReminders();
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300); }, 2000);
}

// ==================== VOICE + LLM ====================
async function toggleVoice() {
  if (isListening) {
    stopListening();
    return;
  }
  await startListening();
}

async function startListening() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    toast('⚠️ 当前浏览器不支持语音识别，请使用 Chrome');
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = settings.lang;
  recognition.interimResults = true;
  recognition.continuous = false;
  recognition.maxAlternatives = 1;

  const bar = document.getElementById('voiceBar');
  const text = document.getElementById('voiceText');
  const dot = document.getElementById('voiceDot');
  const statusText = document.getElementById('voiceStatusText');
  const confirm = document.getElementById('voiceConfirm');
  const fab = document.getElementById('fabBtn');
  const fabLabel = document.getElementById('fabLabel');

  bar.style.display = 'block';
  text.textContent = '正在听...';
  dot.className = 'vb-dot';
  statusText.textContent = '请说中文';
  confirm.style.display = 'none';
  fab.classList.add('listening');
  fabLabel.textContent = '停止';
  isListening = true;
  pendingParsed = null;

  let finalText = '';

  recognition.onresult = (event) => {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        finalText += event.results[i][0].transcript;
      } else {
        interim += event.results[i][0].transcript;
      }
    }
    text.textContent = finalText || interim || '正在听...';
  };

  recognition.onerror = (event) => {
    console.log('Speech error:', event.error);
    if (event.error === 'no-speech') {
      text.textContent = '没有听到声音，请再试一次';
    } else if (event.error === 'aborted') {
      // normal
    } else {
      text.textContent = '识别出错: ' + event.error;
    }
    resetVoiceUI();
  };

  recognition.onend = () => {
    resetVoiceUI();
    if (finalText.trim()) {
      processWithLLM(finalText.trim());
    } else {
      hideVoiceBar();
    }
  };

  recognition.start();
}

function stopListening() {
  if (recognition) {
    recognition.abort();
    recognition = null;
  }
  resetVoiceUI();
}

function resetVoiceUI() {
  const fab = document.getElementById('fabBtn');
  const fabLabel = document.getElementById('fabLabel');
  fab.classList.remove('listening');
  fabLabel.textContent = '点按说话';
  isListening = false;
}

function hideVoiceBar() {
  document.getElementById('voiceBar').style.display = 'none';
  document.getElementById('voiceConfirm').style.display = 'none';
}

async function processWithLLM(text) {
  const bar = document.getElementById('voiceBar');
  const vbText = document.getElementById('voiceText');
  const dot = document.getElementById('voiceDot');
  const statusText = document.getElementById('voiceStatusText');
  const confirm = document.getElementById('voiceConfirm');

  vbText.textContent = `"${text}"`;
  dot.className = 'vb-dot thinking';
  statusText.textContent = 'AI 解析中...';
  bar.style.display = 'block';

  let parsed = null;

  if (settings.apiKey) {
    try {
      parsed = await callLLM(text);
      statusText.textContent = '✅ AI 解析完成';
      dot.className = 'vb-dot';
    } catch (e) {
      console.error('LLM error:', e);
      statusText.textContent = '⚠️ API 调用失败，使用本地解析';
      dot.className = 'vb-dot';
      parsed = localParse(text);
    }
  } else {
    // No API key, use local parser
    await sleep(400);
    parsed = localParse(text);
    statusText.textContent = '✅ 本地解析完成';
    dot.className = 'vb-dot';
  }

  if (!parsed || !parsed.title) {
    vbText.textContent = '无法识别日程信息，请再试一次';
    statusText.textContent = '❌ 解析失败';
    dot.className = 'vb-dot';
    setTimeout(hideVoiceBar, 2000);
    return;
  }

  // Show confirmation
  pendingParsed = parsed;
  const timeInfo = parsed.startTime ? `${parsed.startTime}-${parsed.endTime||''}` : '全天';
  const remindInfo = parsed.reminder ? '· 🔔提醒' : '';
  vbText.innerHTML = `<b>${escHtml(parsed.title)}</b><br><span style="font-size:12px;color:var(--muted);">📅 ${parsed.date} · ${timeInfo} ${remindInfo}</span>`;
  confirm.innerHTML = `
    <button class="btn-yes" onclick="confirmAdd()">✓ 添加</button>
    <button class="btn-no" onclick="cancelAdd()">✗ 取消</button>
  `;
  confirm.style.display = 'flex';
}

async function callLLM(text) {
  const today = fmtDate(new Date());
  const now = new Date();
  const nowTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const weekDates = getWeekDates();

  const systemPrompt = `你是一个日程解析助手。根据用户的自然语言输入，提取日程信息并返回 JSON。

当前时间：${today} ${nowTime}（${['周日','周一','周二','周三','周四','周五','周六'][now.getDay()]}）
本周日期：
- 周一: ${fmtDate(weekDates[0])}
- 周二: ${fmtDate(weekDates[1])}
- 周三: ${fmtDate(weekDates[2])}
- 周四: ${fmtDate(weekDates[3])}
- 周五: ${fmtDate(weekDates[4])}
- 周六: ${fmtDate(weekDates[5])}
- 周日: ${fmtDate(weekDates[6])}

规则：
1. "今天/明天/后天/大后天"等相对日期要转换为 YYYY-MM-DD 格式
2. "下周X/下周一/下周三"等要正确计算日期（本周日期已列出，下周=本周日期+7天）
3. "上午/下午/晚上/中午"要转换为24小时制时间：上午=06:00-12:00，中午=12:00-13:00，下午=13:00-18:00，晚上=18:00-22:00
4. "早上8点/九点/三点半"等要转换为 HH:MM 格式
5. "一个小时/两小时"等时长要计算结束时间
6. 如果没有明确时间，默认 startTime 和 endTime 设为 null（全天事件）
7. 如果提到"提醒"、"提醒我"、"别忘了"、"记得"，设置 reminder 为 true
8. description 字段提炼用户提到的补充信息

只返回 JSON，不要 markdown 代码块，不要任何其他文字：
{"title":"日程标题","date":"YYYY-MM-DD","startTime":"HH:MM或null","endTime":"HH:MM或null","description":"补充说明或空字符串","reminder":true或false}`;

  const resp = await fetch(settings.apiUrl, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${settings.apiKey}`
    },
    body: JSON.stringify({
      model: settings.model,
      messages: [
        { role: 'system', content: systemPrompt },
        { role: 'user', content: text }
      ],
      temperature: 0.1,
      max_tokens: 500
    })
  });

  if (!resp.ok) {
    throw new Error(`API ${resp.status}: ${await resp.text().then(t=>t.slice(0,200))}`);
  }

  const data = await resp.json();
  const content = data.choices?.[0]?.message?.content || '';
  // Extract JSON from response (handle possible markdown wrapping)
  const jsonMatch = content.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error('No JSON in response: ' + content);
  return JSON.parse(jsonMatch[0]);
}

function localParse(text) {
  const today = fmtDate(new Date());
  const weekDates = getWeekDates();
  const dayMap = {
    '今天': today,
    '明天': fmtDate(new Date(Date.now() + 86400000)),
    '后天': fmtDate(new Date(Date.now() + 172800000)),
    '大后天': fmtDate(new Date(Date.now() + 259200000)),
  };
  // Weekday aliases
  const weekdayMap = {};
  ['周一','周二','周三','周四','周五','周六','周日','星期一','星期二','星期三','星期四','星期五','星期六','星期日','礼拜一','礼拜二','礼拜三','礼拜四','礼拜五','礼拜六','礼拜天'].forEach((name, i) => {
    weekdayMap[name] = fmtDate(weekDates[i % 7]);
  });

  // Default
  let date = today;
  let startTime = null;
  let endTime = null;
  let reminder = false;
  let title = text;
  let description = '';

  // Check reminders
  if (/提醒|别忘了|记得|通知|叫我/.test(text)) {
    reminder = true;
  }

  // Extract date
  for (const [word, d] of Object.entries(dayMap)) {
    if (text.includes(word)) { date = d; break; }
  }
  if (date === today) {
    for (const [word, d] of Object.entries(weekdayMap)) {
      if (text.includes(word)) {
        const wd = new Date(d);
        // If the date is before today, assume next week
        if (wd < new Date(today)) wd.setDate(wd.getDate() + 7);
        date = fmtDate(wd);
        break;
      }
    }
  }

  // Extract time
  const timePatterns = [
    /(\d{1,2})[点:：](\d{0,2})?\s*[分]?/g,
    /(上午|中午|下午|晚上|早上|早晨)\s*(\d{1,2})[点:：]?(\d{0,2})?/g,
    /(\d{1,2})[点:：]半/g,
  ];

  let times = [];
  // Simple time matching
  const simpleMatch = text.match(/(\d{1,2})[点:：](\d{2})?/g);
  if (simpleMatch) {
    for (const m of simpleMatch) {
      const parts = m.match(/(\d{1,2})[点:：](\d{2})?/);
      if (parts) {
        let h = parseInt(parts[1]);
        const min = parts[2] ? parseInt(parts[2]) : 0;

        // AM/PM adjustment
        if (/下午|晚上|傍晚/.test(text) && h < 12) h += 12;
        if (/上午|早上|早晨/.test(text) && h === 12) h = 0;
        // If no explicit AM/PM and h <= 6, likely PM (afternoon context)
        if (!/[上中下]午|晚上|早上|早晨|傍晚/.test(text) && h <= 6 && h >= 1) {
          h += 12;
        }

        times.push(`${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}`);
      }
    }
  }

  if (times.length >= 2) {
    startTime = times[0];
    endTime = times[1];
  } else if (times.length === 1) {
    startTime = times[0];
    // Default duration: 1 hour
    const h = parseInt(startTime);
    endTime = `${String(h+1).padStart(2,'0')}:00`;
  }

  // Clean title: remove time/date words
  title = title
    .replace(/今天|明天|后天|大后天/g, '')
    .replace(/下周[一二三四五六日天]/g, '')
    .replace(/[周礼拜][一二三四五六日天]/g, '')
    .replace(/\d{1,2}[点:：]\d{0,2}[分]?/g, '')
    .replace(/提醒[我]?|别忘了|记得|通知[我]?|叫我/g, '')
    .replace(/[上中下]午|晚上|早上|早晨|傍晚/g, '')
    .replace(/\s+/g, ' ')
    .trim();

  if (!title) title = '未命名日程';

  return { title, date, startTime, endTime, description, reminder };
}

function confirmAdd() {
  if (!pendingParsed) return;
  const p = pendingParsed;
  const evt = {
    id: 'evt_' + Date.now(),
    title: p.title || '未命名',
    date: p.date,
    startTime: p.startTime || null,
    endTime: p.endTime || null,
    description: p.description || '',
    reminder: p.reminder || false,
    createdAt: Date.now()
  };
  events.push(evt);
  saveAndRefresh();
  hideVoiceBar();
  pendingParsed = null;
  toast('✅ 已添加: ' + evt.title);
}

function cancelAdd() {
  pendingParsed = null;
  hideVoiceBar();
  toast('已取消');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ==================== SETTINGS ====================
function openSettings() {
  document.getElementById('cfgApiUrl').value = settings.apiUrl;
  document.getElementById('cfgApiKey').value = settings.apiKey;
  document.getElementById('cfgModel').value = settings.model;
  document.getElementById('cfgLang').value = settings.lang;
  document.getElementById('settingsPanel').style.display = 'flex';
}

function closeSettings() {
  document.getElementById('settingsPanel').style.display = 'none';
}

function saveSettings() {
  settings.apiUrl = document.getElementById('cfgApiUrl').value.trim();
  settings.apiKey = document.getElementById('cfgApiKey').value.trim();
  settings.model = document.getElementById('cfgModel').value.trim();
  settings.lang = document.getElementById('cfgLang').value;
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
  closeSettings();
  toast('✅ 设置已保存');
}

// ==================== NAVIGATION ====================
function changeWeek(delta) {
  weekOffset += delta;
  renderTimetable();
}

function goThisWeek() {
  weekOffset = 0;
  renderTimetable();
}

// ==================== REMINDERS ====================
function checkReminders() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const now = new Date();
  const nowStr = fmtDate(now);
  const nowMin = now.getHours() * 60 + now.getMinutes();

  events.forEach(e => {
    if (!e.reminder || !e.startTime || e.date !== nowStr) return;
    const [h, m] = e.startTime.split(':').map(Number);
    const evtMin = h * 60 + m;
    const diff = evtMin - nowMin;
    if (diff >= 0 && diff <= 15) {
      const key = `n_${e.id}_${nowStr}_${Math.floor(nowMin/5)}`;
      if (!sessionStorage.getItem(key)) {
        sessionStorage.setItem(key, '1');
        new Notification('🔔 日程提醒', {
          body: `${e.title}\n${e.startTime.slice(0,5)} · ${diff===0?'现在！':diff+'分钟后'}`,
          tag: e.id,
          requireInteraction: true
        });
        toast(`🔔 ${e.title} ${diff===0?'现在开始':diff+'分钟后'}`);
      }
    }
  });
}

// ==================== INIT ====================
function init() {
  renderTimetable();
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
  setInterval(checkReminders, 30000);
  checkReminders();
}

init();
</script>
