<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f5f5f7">
<title>语音日程</title>
<link rel="manifest" href="manifest.json">
<style>
:root {
  --bg: #f5f5f7;
  --card: #fff;
  --text: #1d1d1f;
  --muted: #86868b;
  --border: #e5e5ea;
  --blue: #007aff;
  --red: #ff3b30;
  --shadow: 0 2px 12px rgba(0,0,0,.06);
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh; height: 100dvh;
  display: flex; flex-direction: column;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none; -webkit-user-select: none;
}
/* ── Header ── */
.header {
  background: var(--card);
  padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.header h1 { font-size: 18px; font-weight: 700; }
.header-actions { display: flex; gap: 8px; }
.icon-btn {
  width: 34px; height: 34px; border-radius: 50%;
  border: none; background: var(--bg);
  font-size: 17px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.icon-btn:active { background: #d1d1d6; transform: scale(.94); }
/* ── Week nav ── */
.week-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; flex-shrink: 0; gap: 6px;
}
.week-nav .week-label { font-size: 13px; font-weight: 600; text-align: center; flex:1; }
.week-nav .nav-arrow {
  width: 30px; height: 30px; border-radius: 50%;
  border: none; background: var(--card); font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow); transition: all .15s;
}
.week-nav .nav-arrow:active { background: #d1d1d6; }
.today-btn {
  font-size: 11px; padding: 5px 10px; border-radius: 14px;
  border: 1.5px solid var(--blue); background: #fff;
  color: var(--blue); font-weight: 600; cursor: pointer;
}
/* ── Timetable ── */
.timetable-wrap {
  flex: 1; min-height: 0; overflow: auto; -webkit-overflow-scrolling: touch;
  background: var(--card); margin: 0 8px;
  border-radius: var(--radius); box-shadow: var(--shadow);
  position: relative;
}
.timetable-inner { position: relative; min-height: 100%; }
.timetable {
  display: grid;
  grid-template-columns: 40px repeat(7, 1fr);
  min-width: 100%; font-size: 11px;
}
/* Day headers */
.tt-header {
  position: sticky; top: 0; z-index: 3;
  background: var(--card); padding: 8px 2px; text-align: center;
  font-weight: 600; font-size: 11px; border-bottom: 1px solid var(--border);
}
.tt-header.today { background: #e8f2ff; }
.tt-header .day-name { display: block; }
.tt-header .day-date {
  display: block; width: 22px; height: 22px; line-height: 22px;
  border-radius: 50%; margin: 3px auto 0; font-size: 11px;
}
.tt-header.today .day-date { background: var(--blue); color: #fff; }
/* Time labels + grid cells */
.tt-time {
  position: sticky; left: 0; z-index: 2;
  background: var(--card); text-align: center;
  font-size: 10px; color: var(--muted); padding: 2px 0;
  border-right: 1px solid var(--border);
  display: flex; align-items: flex-start; justify-content: center;
  padding-top: 4px; font-weight: 500;
}
.tt-cell {
  min-height: 48px;
  border-bottom: 1px solid #f0f0f5;
  border-right: 1px solid #f0f0f5;
  cursor: pointer; transition: background .1s;
  position: relative;
}
.tt-cell:active { background: #f0f0f5; }
.tt-cell.today { background: #fafbff; }
/* ── Event blocks (fluorescent highlights) ── */
.evt-block {
  position: absolute;
  border-radius: 5px;
  cursor: pointer;
  overflow: hidden;
  font-size: 10px;
  font-weight: 600;
  line-height: 1.3;
  padding: 3px 5px;
  white-space: nowrap;
  text-overflow: ellipsis;
  z-index: 1;
  transition: transform .1s, box-shadow .1s;
  border-left: 3px solid transparent;
}
.evt-block:active { transform: scale(.97); z-index: 5; box-shadow: 0 2px 12px rgba(0,0,0,.15); }
.evt-block .evt-time { font-size: 8px; opacity: .8; display: block; }
.evt-block .evt-title { display: block; overflow: hidden; text-overflow: ellipsis; }
/* Fluorescent color variants (8 colors) */
.f0 { background: linear-gradient(135deg, rgba(255,235,120,0.82), rgba(255,220,80,0.75)); border-left-color: #e6b800; color: #6B5900; }
.f1 { background: linear-gradient(135deg, rgba(255,145,145,0.82), rgba(255,120,120,0.75)); border-left-color: #e03131; color: #6B1010; }
.f2 { background: linear-gradient(135deg, rgba(135,225,155,0.82), rgba(100,210,130,0.75)); border-left-color: #2f9e44; color: #0D4A18; }
.f3 { background: linear-gradient(135deg, rgba(135,205,255,0.82), rgba(100,185,250,0.75)); border-left-color: #1971c2; color: #003560; }
.f4 { background: linear-gradient(135deg, rgba(210,150,240,0.82), rgba(190,125,230,0.75)); border-left-color: #845ef7; color: #3B0070; }
.f5 { background: linear-gradient(135deg, rgba(255,185,105,0.82), rgba(255,165,80,0.75));  border-left-color: #e8590c; color: #6B2D00; }
.f6 { background: linear-gradient(135deg, rgba(100,225,205,0.82), rgba(70,210,190,0.75)); border-left-color: #0c8599; color: #003D3D; }
.f7 { background: linear-gradient(135deg, rgba(255,145,185,0.82), rgba(255,120,165,0.75)); border-left-color: #d6336c; color: #6B0028; }
/* ── Bottom input bar (flex flow, NOT position:fixed — Android WebView safe) ── */
.input-bar {
  flex-shrink: 0;
  background: var(--card); border-top: 1px solid var(--border);
  padding: 10px 12px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  display: flex; gap: 8px; align-items: center;
}
.input-bar input {
  flex: 1; padding: 11px 14px; border: 1.5px solid var(--border);
  border-radius: 22px; font-size: 15px; font-family: inherit;
  background: #f5f5f7; outline: none; min-width: 0;
}
.input-bar input:focus { border-color: var(--blue); background: #fff; }
.input-bar .send-btn {
  width: 42px; height: 42px; border-radius: 50%; border: none;
  background: var(--blue); color: #fff; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .15s;
}
.input-bar .send-btn:active { transform: scale(.92); }
.input-bar .send-btn:disabled { background: #ccc; }
.mic-hint {
  flex-shrink: 0;
  text-align: center; font-size: 10px; color: var(--muted);
  padding: 4px 12px 0; background: var(--bg);
}
/* ── Confirm bar (shown after LLM parses, in flex flow) ── */
.confirm-bar {
  flex-shrink: 0;
  background: var(--card); border-radius: var(--radius);
  padding: 14px 16px; margin: 0 8px;
  box-shadow: 0 4px 24px rgba(0,0,0,.15);
  display: none; animation: slideUp .25s;
}
@keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.confirm-bar .cf-text { font-size: 14px; font-weight: 500; line-height: 1.4; margin-bottom: 8px; }
.confirm-bar .cf-btns { display: flex; gap: 8px; }
.confirm-bar .cf-btns button {
  flex:1; padding: 9px; border-radius: 8px; border: none;
  font-size: 13px; font-weight: 600; cursor: pointer;
}
.cf-btns .btn-yes { background: var(--blue); color: #fff; }
.cf-btns .btn-no { background: #f1f1f4; color: var(--text); }
/* loading spinner in input bar */
.input-bar .loading-spinner {
  width: 20px; height: 20px; border: 2px solid #ddd; border-top-color: var(--blue);
  border-radius: 50%; animation: spin .6s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
/* ── Event detail sheet ── */
.sheet-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 200;
  display: none; align-items: flex-end; animation: fadeIn .2s;
}
@keyframes fadeIn { from { opacity:0; } }
.sheet {
  background: var(--card); border-radius: 20px 20px 0 0;
  padding: 20px 20px 32px; width: 100%; max-height: 80vh;
  overflow-y: auto; animation: slideUp2 .3s;
}
@keyframes slideUp2 { from { transform:translateY(100%); } }
.sheet-handle { width: 36px; height: 4px; background: #d1d1d6; border-radius: 2px; margin: 0 auto 16px; }
.sheet h3 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.sheet .sheet-info { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
.sheet .sheet-desc { font-size: 14px; line-height: 1.5; color: #555; margin-bottom: 12px; }
.sheet .sheet-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.sheet .sheet-tag { font-size: 11px; padding: 4px 10px; border-radius: 12px; font-weight: 600; }
.sheet-tag.remind { background: #fff3cd; color: #856404; }
.sheet .sheet-actions { display: flex; gap: 10px; }
.sheet .sheet-actions button {
  flex:1; padding: 12px; border-radius: 10px; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer;
}
/* ── Settings panel ── */
.settings-panel {
  position: fixed; inset: 0; z-index: 300; display: none;
  align-items: center; justify-content: center; background: rgba(0,0,0,.4);
}
.settings-card {
  background: var(--card); border-radius: 20px; padding: 24px;
  width: 320px; max-width: 90vw; max-height: 85vh; overflow-y: auto;
}
.settings-card h3 { font-size: 17px; margin-bottom: 14px; }
.settings-card label {
  display: block; font-size: 11px; font-weight: 600;
  color: var(--muted); margin-bottom: 3px; margin-top: 10px;
}
.settings-card input, .settings-card select {
  width: 100%; padding: 9px 10px; border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 13px; font-family: inherit;
}
.settings-card input:focus { outline: none; border-color: var(--blue); }
.settings-card .hint { font-size: 10px; color: var(--muted); margin-top: 3px; }
.settings-card .btn-row { display: flex; gap: 8px; margin-top: 16px; }
.settings-card .btn-row button {
  flex:1; padding: 10px; border-radius: 8px; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer;
}
/* ── Toast ── */
.toast {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  background: #1d1d1f; color: #fff; padding: 10px 20px; border-radius: 20px;
  font-size: 13px; font-weight: 600; z-index: 999;
  animation: toastIn .3s; pointer-events: none;
}
@keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(-10px); } }

/* ── Color legend bar ── */
.legend-bar {
  display: flex; gap: 4px; padding: 4px 12px; flex-shrink: 0;
  overflow-x: auto; flex-wrap: wrap;
}
.legend-dot {
  width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0;
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>📅 语音日程</h1>
  <div class="header-actions">
    <button class="icon-btn" onclick="openSettings()" title="设置">⚙️</button>
  </div>
</div>

<!-- Week navigation -->
<div class="week-nav">
  <button class="nav-arrow" onclick="changeWeek(-1)">◀</button>
  <span class="week-label" id="weekLabel"></span>
  <button class="nav-arrow" onclick="changeWeek(1)">▶</button>
  <button class="today-btn" onclick="goThisWeek()">本周</button>
</div>

<!-- Timetable -->
<div class="timetable-wrap" id="timetableWrap">
  <div class="timetable-inner" id="timetableInner">
    <div class="timetable" id="timetable"></div>
  </div>
</div>

<!-- Keyboard mic hint -->
<div class="mic-hint" id="micHint">💡 可直接打字输入，或使用键盘上的 🎤 按钮语音输入</div>
<!-- Bottom input bar -->
<div class="input-bar" id="inputBar">
  <input type="text" id="scheduleInput" placeholder="说说日程，如：明天下午3点开会 提醒我"
    autocomplete="off" autocorrect="off">
  <button class="send-btn" id="sendBtn" onclick="submitInput()">➤</button>
</div>

<!-- Confirm bar -->
<div class="confirm-bar" id="confirmBar">
  <div class="cf-text" id="cfText"></div>
  <div class="cf-btns">
    <button class="btn-yes" onclick="confirmAdd()">✓ 添加</button>
    <button class="btn-no" onclick="cancelAdd()">✗ 取消</button>
  </div>
</div>

<!-- Event detail sheet -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet(event)">
  <div class="sheet" id="sheetBox" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div id="sheetContent"></div>
  </div>
</div>

<!-- Settings -->
<div class="settings-panel" id="settingsPanel" onclick="if(event.target===this)closeSettings()">
  <div class="settings-card" onclick="event.stopPropagation()">
    <h3>⚙️ 设置</h3>

    <label style="color:var(--blue);">🧠 日程解析 (LLM)</label>
    <label>API 地址</label>
    <input type="text" id="cfgApiUrl" placeholder="https://api.deepseek.com/v1/chat/completions">
    <label>API Key</label>
    <input type="password" id="cfgApiKey" placeholder="sk-...">
    <label>模型</label>
    <input type="text" id="cfgModel" placeholder="deepseek-chat">

    <label style="color:var(--blue);margin-top:16px;">🎤 语音识别 (STT)</label>
    <label>API 地址</label>
    <input type="text" id="cfgSttApiUrl" placeholder="https://api.openai.com/v1/audio/transcriptions">
    <label>API Key</label>
    <input type="password" id="cfgSttApiKey" placeholder="sk-...（OpenAI Key）">
    <label>模型</label>
    <input type="text" id="cfgSttModel" placeholder="whisper-1">
    <div class="hint">OpenAI Whisper API</div>

    <label style="margin-top:10px;">语音语言</label>
    <select id="cfgLang">
      <option value="zh-CN">中文普通话</option>
      <option value="en-US">English</option>
    </select>

    <div class="btn-row">
      <button style="background:#f1f1f4;color:var(--text);" onclick="closeSettings()">取消</button>
      <button style="background:var(--blue);color:#fff;" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<script>
// ==================== DATA ====================
const STORAGE_KEY = 'voice_schedule_events';
const SETTINGS_KEY = 'voice_schedule_settings';
const TOTAL_FLUORO = 8;

let events = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let settings = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
let weekOffset = 0;
let pendingParsed = null;

const defaults = {
  apiUrl: 'https://api.deepseek.com/v1/chat/completions',
  apiKey: 'sk-310cc6d8520544fab871f78bcd254b4b',
  model: 'deepseek-chat',
  sttApiUrl: 'https://api.openai.com/v1/audio/transcriptions',
  sttApiKey: 'sk-proj-evn7dJfSNJHnrrcJqeoBc-' + 'ANJrykOXMrl84tzTfZI4201miOWRWtl5OAdAWW-Qogly7DDdBGl9T3BlbkFJNbSOhy_7KWIjEs7BdCkLAXC26AHIXO5DysMpiWz44zHIi6PKYRnWvMlV3v9gG6RXRk22Y9H7kA',
  sttModel: 'whisper-1',
  lang: 'zh-CN'
};
settings = { ...defaults, ...settings };

// ==================== WEEK CALCULATION ====================
function getMonday(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  d.setDate(diff); d.setHours(0,0,0,0);
  return d;
}

function getWeekDates() {
  const monday = getMonday(new Date());
  monday.setDate(monday.getDate() + weekOffset * 7);
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(d.getDate() + i);
    dates.push(d);
  }
  return dates;
}

function fmtDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fmtShort(d) { return `${d.getMonth()+1}/${d.getDate()}`; }

// ==================== COLOR ASSIGNMENT ====================
function getEventFluoroClass(eventId) {
  const idx = events.findIndex(e => e.id === eventId);
  return 'f' + (idx % TOTAL_FLUORO);
}

// ==================== OVERLAP COMPUTATION ====================
// For a given day, compute which events overlap and assign each a "column" index

function computeDayLayout(dayEvents) {
  // Returns: { maxCols: number, colMap: { eventId -> colIndex }, hourMap: { hour -> [eventIds sorted] } }
  if (dayEvents.length === 0) return { maxCols: 1, colMap: {}, hourMap: {} };

  // For each hour 6-23, find active events
  const hourMap = {};
  for (let h = 6; h <= 23; h++) {
    hourMap[h] = [];
    for (const evt of dayEvents) {
      const sh = parseInt((evt.startTime || '06:00').split(':')[0]);
      const eh = parseInt((evt.endTime || '24:00').split(':')[0]);
      if (sh <= h && eh > h) {
        hourMap[h].push(evt);
      }
    }
    // Sort by start time for consistency
    hourMap[h].sort((a, b) => (a.startTime||'').localeCompare(b.startTime||'') || a.title.localeCompare(b.title));
  }

  // Max simultaneous events
  let maxCols = 1;
  for (let h = 6; h <= 23; h++) {
    maxCols = Math.max(maxCols, hourMap[h].length || 1);
  }

  // Greedy column assignment: sort events by start time, assign each to first free column
  const sorted = [...dayEvents].sort((a, b) =>
    (a.startTime || '00:00').localeCompare(b.startTime || '00:00') || a.title.localeCompare(b.title)
  );

  const colMap = {}; // eventId -> col
  const colBusyUntil = {}; // col -> endHour (when this column frees up)

  for (const evt of sorted) {
    const sh = parseInt((evt.startTime || '06:00').split(':')[0]);
    // Find first free column
    let col = 0;
    while (colBusyUntil[col] !== undefined && colBusyUntil[col] > sh) {
      col++;
    }
    colMap[evt.id] = col;
    colBusyUntil[col] = parseInt((evt.endTime || '24:00').split(':')[0]);
    if (col + 1 > maxCols) maxCols = col + 1;
  }

  return { maxCols, colMap, hourMap };
}

// ==================== RENDER TIMETABLE ====================
function renderTimetable() {
  const dates = getWeekDates();
  const todayStr = fmtDate(new Date());
  const days = ['周一','周二','周三','周四','周五','周六','周日'];

  const grid = document.getElementById('timetable');
  const label = document.getElementById('weekLabel');
  const wrap = document.getElementById('timetableWrap');

  const first = dates[0], last = dates[6];
  label.textContent = `${first.getMonth()+1}月${first.getDate()}日 - ${last.getMonth()+1}月${last.getDate()}日`;

  // ── Build grid HTML (cells only, no events inside) ──
  let html = '';
  // Corner spacer
  html += '<div class="tt-header" style="position:sticky;top:0;left:0;z-index:4;background:var(--card);"></div>';
  // Day headers
  for (let i = 0; i < 7; i++) {
    const d = dates[i];
    const dateStr = fmtDate(d);
    const isToday = dateStr === todayStr;
    html += `<div class="tt-header${isToday?' today':''}" style="position:sticky;top:0;z-index:3;">
      <span class="day-name">${days[i]}</span>
      <span class="day-date">${d.getDate()}</span>
    </div>`;
  }
  // Time rows
  for (let h = 6; h <= 23; h++) {
    const slot = `${String(h).padStart(2,'0')}:00`;
    html += `<div class="tt-time" style="position:sticky;left:0;z-index:2;">${slot}</div>`;
    for (let i = 0; i < 7; i++) {
      const d = dates[i];
      const dateStr = fmtDate(d);
      const isToday = dateStr === todayStr;
      html += `<div class="tt-cell${isToday?' today':''}"
        data-date="${dateStr}" data-hour="${h}"
        onclick="onCellClick('${dateStr}',${h})"></div>`;
    }
  }
  grid.innerHTML = html;

  // ── Render event blocks as absolutely-positioned overlays ──
  // Remove old event blocks
  document.querySelectorAll('.evt-block').forEach(el => el.remove());

  const inner = document.getElementById('timetableInner');
  const HEADER_H = 44; // approximate header height in px
  const ROW_H = 48;     // row height in px

  for (let dayIdx = 0; dayIdx < 7; dayIdx++) {
    const dateStr = fmtDate(dates[dayIdx]);
    const dayEvents = getEventsForDate(dateStr);
    if (dayEvents.length === 0) continue;

    const layout = computeDayLayout(dayEvents);

    for (const evt of dayEvents) {
      const startH = parseInt((evt.startTime || '06:00').split(':')[0]);
      const startM = parseInt((evt.startTime || '06:00').split(':')[1] || '0');
      // If no endTime, default to startTime + 1 hour (not entire day)
      let effEnd = evt.endTime;
      if (!effEnd && evt.startTime) {
        const eh = startH + 1;
        effEnd = `${String(eh).padStart(2,'0')}:${String(startM).padStart(2,'0')}`;
      }
      const endH = parseInt((effEnd || '06:00').split(':')[0]);
      const endM = parseInt((effEnd || '06:00').split(':')[1] || '0');

      const top = HEADER_H + (startH - 6) * ROW_H + (startM / 60) * ROW_H;
      const bottom = HEADER_H + (endH - 6) * ROW_H + (endM / 60) * ROW_H;
      const height = bottom - top;

      const colIndex = layout.colMap[evt.id] || 0;
      const totalCols = layout.maxCols;

      // Column width: each day column is 1fr
      // Grid: 40px | repeat(7, 1fr)
      // Get actual column width from the grid
      const gridEl = document.getElementById('timetable');
      const gridWidth = gridEl.offsetWidth;
      const timeColWidth = 40;
      const dayColWidth = (gridWidth - timeColWidth) / 7;

      // left = timeCol + dayIdx * dayCol + colOffset
      const left = timeColWidth + dayIdx * dayColWidth + (colIndex / totalCols) * dayColWidth;
      const width = dayColWidth / totalCols - 2; // 2px gap

      const fluoroClass = getEventFluoroClass(evt.id);
      const timeLabel = evt.startTime ? `${evt.startTime.slice(0,5)}` : '';
      const endLabel = evt.endTime ? `${evt.endTime.slice(0,5)}` : '';

      const block = document.createElement('div');
      block.className = `evt-block ${fluoroClass}`;
      block.style.cssText = `top:${top}px;left:${left}px;width:${Math.max(width,20)}px;height:${Math.max(height,16)}px;`;
      block.setAttribute('data-evtid', evt.id);
      block.onclick = function(e) { e.stopPropagation(); openEvent(evt.id); };

      // Content: show time range + title if enough space
      if (height > 30) {
        block.innerHTML = `<span class="evt-time">${timeLabel}${endLabel?' - '+endLabel:''}</span><span class="evt-title">${escHtml(evt.title)}</span>`;
      } else {
        block.innerHTML = `<span class="evt-title">${escHtml(evt.title)}</span>`;
      }

      inner.appendChild(block);
    }
  }

  // ── Scroll to current time ──
  const now = new Date();
  const curHour = now.getHours();
  const scrollTo = Math.max(0, curHour - 3);
  const scrollPos = HEADER_H + (scrollTo - 6) * ROW_H;
  if (weekOffset === 0) {
    setTimeout(() => { wrap.scrollTop = Math.max(0, scrollPos); }, 100);
  }
}

function getEventsForDate(dateStr) {
  return events.filter(e => e.date === dateStr).sort((a,b) => (a.startTime||'').localeCompare(b.startTime||''));
}

// ==================== EVENT SHEET ====================
function onCellClick(dateStr, hour) {
  const startTime = `${String(hour).padStart(2,'0')}:00`;
  const endTime = `${String(hour+1).padStart(2,'0')}:00`;
  showAddSheet(dateStr, startTime, endTime);
}

function showAddSheet(dateStr, startTime, endTime) {
  const sheet = document.getElementById('sheetOverlay');
  const content = document.getElementById('sheetContent');
  content.innerHTML = `
    <div class="sheet-handle"></div>
    <h3>新建日程</h3>
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:12px;">
      <input type="text" id="addTitle" placeholder="日程标题" style="width:100%;padding:12px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;">
      <input type="date" id="addDate" value="${dateStr}" style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;">
      <div style="display:flex;gap:8px;">
        <input type="time" id="addStart" value="${startTime}" style="flex:1;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;">
        <span style="line-height:40px;color:var(--muted);">至</span>
        <input type="time" id="addEnd" value="${endTime}" style="flex:1;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;">
      </div>
      <textarea id="addDesc" placeholder="备注（可选）" style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;min-height:60px;resize:vertical;"></textarea>
      <label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer;">
        <input type="checkbox" id="addRemind" checked> 日程开始时弹窗提醒
      </label>
    </div>
    <div class="sheet-actions" style="margin-top:16px;">
      <button style="background:#f1f1f4;color:var(--text);" onclick="closeSheet()">取消</button>
      <button style="background:var(--blue);color:#fff;" onclick="saveNewEvent()">保存</button>
    </div>
  `;
  sheet.style.display = 'flex';
}

function openEvent(id) {
  const evt = events.find(e => e.id === id);
  if (!evt) return;
  const sheet = document.getElementById('sheetOverlay');
  const content = document.getElementById('sheetContent');
  const timeStr = evt.startTime ? `${evt.startTime.slice(0,5)} - ${evt.endTime?.slice(0,5) || '?'}` : '全天';
  const remindTag = evt.reminder ? '<span class="sheet-tag remind">🔔 已开启提醒</span>' : '';

  content.innerHTML = `
    <div class="sheet-handle"></div>
    <h3>${escHtml(evt.title)}</h3>
    <div class="sheet-info">📅 ${evt.date} · ${timeStr}</div>
    ${evt.description ? `<div class="sheet-desc">${escHtml(evt.description)}</div>` : ''}
    <div class="sheet-tags">${remindTag}</div>
    <div class="sheet-actions">
      <button style="background:#f1f1f4;color:var(--text);" onclick="closeSheet()">关闭</button>
      <button style="background:var(--red);color:#fff;" onclick="deleteEvent('${evt.id}')">删除</button>
    </div>
  `;
  sheet.style.display = 'flex';
}

function closeSheet(evt) {
  if (evt && evt.target !== document.getElementById('sheetOverlay')) return;
  document.getElementById('sheetOverlay').style.display = 'none';
}

function saveNewEvent() {
  const title = document.getElementById('addTitle').value.trim();
  const date = document.getElementById('addDate').value;
  const startTime = document.getElementById('addStart').value;
  const endTime = document.getElementById('addEnd').value;
  const description = document.getElementById('addDesc').value.trim();
  const reminder = document.getElementById('addRemind').checked;

  if (!title) { toast('请输入标题'); return; }
  if (!date) { toast('请选择日期'); return; }

  const evt = {
    id: 'evt_' + Date.now(),
    title, date,
    startTime: startTime || null,
    endTime: endTime || null,
    description, reminder,
    createdAt: Date.now()
  };

  events.push(evt);
  saveAndRefresh();
  closeSheet();
  toast('✅ 日程已添加');
}

function deleteEvent(id) {
  if (!confirm('确定删除？')) return;
  events = events.filter(e => e.id !== id);
  saveAndRefresh();
  closeSheet();
  toast('🗑️ 已删除');
}

function saveAndRefresh() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
  renderTimetable();
  checkReminders();
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300); }, 2000);
}

// ==================== INPUT SUBMISSION ====================
// User types (or uses keyboard mic) → DeepSeek parses → confirm → add

async function submitInput() {
  const inp = document.getElementById('scheduleInput');
  const btn = document.getElementById('sendBtn');
  const text = inp.value.trim();
  if (!text) { toast('请输入日程内容'); return; }

  // Show loading
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span>';

  try {
    await processWithLLM(text);
  } catch (e) {
    toast('⚠️ 解析失败，请重试');
    btn.disabled = false;
    btn.textContent = '➤';
  }
}

// Called after LLM parse succeeds (with parsed data ready)
// Shows confirm bar at bottom
function showConfirmBar(parsed) {
  pendingParsed = parsed;
  const timeInfo = parsed.startTime ? `${parsed.startTime}-${parsed.endTime||''}` : '全天';
  const remindInfo = parsed.reminder ? '· 🔔提醒' : '';
  document.getElementById('cfText').innerHTML =
    `<b>${escHtml(parsed.title)}</b><br><span style="font-size:12px;color:var(--muted);">📅 ${parsed.date} · ${timeInfo} ${remindInfo}</span>`;
  document.getElementById('confirmBar').style.display = 'block';
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('sendBtn').textContent = '➤';
}

async function processWithLLM(text) {
  let parsed = null;
  if (settings.apiKey) {
    try {
      parsed = await callLLM(text);
    } catch (e) {
      console.error('LLM error:', e);
      parsed = localParse(text);
    }
  } else {
    await sleep(400);
    parsed = localParse(text);
  }

  if (!parsed || !parsed.title) {
    toast('❌ 无法识别日程信息，请换种说法试试');
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('sendBtn').textContent = '➤';
    return;
  }

  showConfirmBar(parsed);
}

async function callLLM(text) {
  const today = fmtDate(new Date());
  const now = new Date();
  const nowTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const weekDates = getWeekDates();

  const systemPrompt = `你是一个日程解析助手。根据用户的自然语言输入，提取日程信息并返回 JSON。

当前时间：${today} ${nowTime}（${['周日','周一','周二','周三','周四','周五','周六'][now.getDay()]}）
本周日期：
- 周一: ${fmtDate(weekDates[0])}
- 周二: ${fmtDate(weekDates[1])}
- 周三: ${fmtDate(weekDates[2])}
- 周四: ${fmtDate(weekDates[3])}
- 周五: ${fmtDate(weekDates[4])}
- 周六: ${fmtDate(weekDates[5])}
- 周日: ${fmtDate(weekDates[6])}

规则：
1. "今天/明天/后天/大后天"转 YYYY-MM-DD
2. "下周X/下周一/下周三"等=本周日期+7天
3. "上午/下午/晚上/中午"转24小时
4. "8点/九点/三点半"转 HH:MM
5. "一个小时/两小时"计算结束时间
6. 只有一个时间点（如"8点"），endTime 设为 startTime+1小时，不要留空
7. 无任何时间则 startTime/endTime 为 null
8. 含"提醒/别忘了/记得"则 reminder=true
9. description 提炼补充信息

只返回 JSON（不要代码块）：
{"title":"标题","date":"YYYY-MM-DD","startTime":"HH:MM或null","endTime":"HH:MM或null","description":"补充","reminder":true或false}`;

  const resp = await fetch(settings.apiUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${settings.apiKey}` },
    body: JSON.stringify({
      model: settings.model,
      messages: [
        { role: 'system', content: systemPrompt },
        { role: 'user', content: text }
      ],
      temperature: 0.1, max_tokens: 500
    })
  });

  if (!resp.ok) throw new Error(`API ${resp.status}`);
  const data = await resp.json();
  const content = data.choices?.[0]?.message?.content || '';
  const jsonMatch = content.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error('No JSON in response');
  return JSON.parse(jsonMatch[0]);
}

function localParse(text) {
  const today = fmtDate(new Date());
  const weekDates = getWeekDates();
  const dayMap = {
    '今天': today,
    '明天': fmtDate(new Date(Date.now() + 86400000)),
    '后天': fmtDate(new Date(Date.now() + 172800000)),
    '大后天': fmtDate(new Date(Date.now() + 259200000)),
  };
  const weekdayMap = {};
  ['周一','周二','周三','周四','周五','周六','周日','星期一','星期二','星期三','星期四','星期五','星期六','星期日','礼拜一','礼拜二','礼拜三','礼拜四','礼拜五','礼拜六','礼拜天'].forEach((name, i) => {
    weekdayMap[name] = fmtDate(weekDates[i % 7]);
  });

  let date = today;
  let startTime = null, endTime = null;
  let reminder = false;
  let title = text;
  let description = '';

  if (/提醒|别忘了|记得|通知|叫我/.test(text)) reminder = true;

  for (const [word, d] of Object.entries(dayMap)) {
    if (text.includes(word)) { date = d; break; }
  }
  if (date === today) {
    for (const [word, d] of Object.entries(weekdayMap)) {
      if (text.includes(word)) {
        const wd = new Date(d);
        if (wd < new Date(today)) wd.setDate(wd.getDate() + 7);
        date = fmtDate(wd); break;
      }
    }
  }

  const simpleMatch = text.match(/(\d{1,2})[点:：](\d{2})?/g);
  let times = [];
  if (simpleMatch) {
    for (const m of simpleMatch) {
      const parts = m.match(/(\d{1,2})[点:：](\d{2})?/);
      if (parts) {
        let h = parseInt(parts[1]);
        const min = parts[2] ? parseInt(parts[2]) : 0;
        if (/下午|晚上|傍晚/.test(text) && h < 12) h += 12;
        if (/上午|早上|早晨/.test(text) && h === 12) h = 0;
        if (!/[上中下]午|晚上|早上|早晨|傍晚/.test(text) && h <= 6 && h >= 1) h += 12;
        times.push(`${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}`);
      }
    }
  }

  if (times.length >= 2) { startTime = times[0]; endTime = times[1]; }
  else if (times.length === 1) { startTime = times[0]; endTime = `${String(parseInt(startTime)+1).padStart(2,'0')}:00`; }

  title = title
    .replace(/今天|明天|后天|大后天/g, '')
    .replace(/下周[一二三四五六日天]/g, '')
    .replace(/[周礼拜][一二三四五六日天]/g, '')
    .replace(/\d{1,2}[点:：]\d{0,2}[分]?/g, '')
    .replace(/提醒[我]?|别忘了|记得|通知[我]?|叫我/g, '')
    .replace(/[上中下]午|晚上|早上|早晨|傍晚/g, '')
    .replace(/\s+/g, ' ').trim();
  if (!title) title = '未命名日程';

  return { title, date, startTime, endTime, description, reminder };
}

function confirmAdd() {
  if (!pendingParsed) return;
  const p = pendingParsed;
  const evt = {
    id: 'evt_' + Date.now(),
    title: p.title || '未命名',
    date: p.date,
    startTime: p.startTime || null,
    endTime: p.endTime || null,
    description: p.description || '',
    reminder: p.reminder || false,
    createdAt: Date.now()
  };
  events.push(evt);
  saveAndRefresh();
  // Clear input & hide confirm
  document.getElementById('scheduleInput').value = '';
  document.getElementById('confirmBar').style.display = 'none';
  pendingParsed = null;
  toast('✅ 已添加: ' + evt.title);
}

function cancelAdd() {
  pendingParsed = null;
  document.getElementById('confirmBar').style.display = 'none';
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('sendBtn').textContent = '➤';
  toast('已取消');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ==================== SETTINGS ====================
function openSettings() {
  document.getElementById('cfgApiUrl').value = settings.apiUrl;
  document.getElementById('cfgApiKey').value = settings.apiKey;
  document.getElementById('cfgModel').value = settings.model;
  document.getElementById('cfgSttApiUrl').value = settings.sttApiUrl || '';
  document.getElementById('cfgSttApiKey').value = settings.sttApiKey || '';
  document.getElementById('cfgSttModel').value = settings.sttModel || 'whisper-1';
  document.getElementById('cfgLang').value = settings.lang;
  document.getElementById('settingsPanel').style.display = 'flex';
}

function closeSettings() {
  document.getElementById('settingsPanel').style.display = 'none';
}

function saveSettings() {
  settings.apiUrl = document.getElementById('cfgApiUrl').value.trim();
  settings.apiKey = document.getElementById('cfgApiKey').value.trim();
  settings.model = document.getElementById('cfgModel').value.trim();
  settings.sttApiUrl = document.getElementById('cfgSttApiUrl').value.trim();
  settings.sttApiKey = document.getElementById('cfgSttApiKey').value.trim();
  settings.sttModel = document.getElementById('cfgSttModel').value.trim();
  settings.lang = document.getElementById('cfgLang').value;
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
  closeSettings();
  toast('✅ 设置已保存');
}

// ==================== NAVIGATION ====================
function changeWeek(delta) { weekOffset += delta; renderTimetable(); }
function goThisWeek() { weekOffset = 0; renderTimetable(); }

// ==================== REMINDERS ====================
function checkReminders() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const now = new Date();
  const nowStr = fmtDate(now);
  const nowMin = now.getHours() * 60 + now.getMinutes();

  events.forEach(e => {
    if (!e.reminder || !e.startTime || e.date !== nowStr) return;
    const [h, m] = e.startTime.split(':').map(Number);
    const evtMin = h * 60 + m;
    // Fire at exact start time (within 1 minute after the scheduled minute)
    if (nowMin >= evtMin && nowMin < evtMin + 1) {
      const key = `n_${e.id}_${nowStr}`;
      if (!sessionStorage.getItem(key)) {
        sessionStorage.setItem(key, '1');
        new Notification('🔔 日程提醒', {
          body: `${e.title}\n⏰ ${e.startTime.slice(0,5)} 到了！`,
          tag: e.id, requireInteraction: true
        });
        toast(`🔔 ${e.title} 开始了！`);
      }
    }
  });
}

// ==================== INIT ====================
function init() {
  renderTimetable();
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission().then(perm => {
      if (perm === 'granted') toast('✅ 通知已开启，日程开始时会弹窗提醒');
      else if (perm === 'denied') toast('⚠️ 通知被拒绝，可在系统设置中手动开启');
    });
  }
  setInterval(checkReminders, 10000);
  checkReminders();

  // Enter key submits input
  document.getElementById('scheduleInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') submitInput();
  });

  // Re-render on resize to fix event block positions
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(renderTimetable, 200);
  });
}

init();
</script>
